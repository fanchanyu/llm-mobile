  ['inventory_transactions','parts','part_id','#22c55e',false],
  // ── Purchase ──
  ['purchase_orders','suppliers','supplier_id','#ca8a04',false],
  ['purchase_order_items','purchase_orders','po_id','#ca8a04',false],
  ['purchase_order_items','parts','part_id','#ca8a04',true],
  // ── BOM ──
  ['bom_items','products','product_id','#8b5cf6',false],
  ['bom_items','parts','part_id','#8b5cf6',true],
  ['production_orders','sales_orders','so_id','#8b5cf6',true],
  // ── Dispatch ──
  ['operations','production_orders','order_id','#ec4899',true],
  ['operations','work_centers','work_center_id','#ec4899',false],
  ['dispatch_logs','operations','operation_id','#ec4899',true],
  ['dispatch_logs','production_orders','order_id','#ec4899',true],
  ['dispatch_logs','work_centers','from_wc','#ec4899',true],
  ['dispatch_logs','work_centers','to_wc','#ec4899',true],
  // ── Quality ──
  ['inspection_orders','purchase_orders','po_id','#ef4444',true],
  ['inspection_orders','parts','part_id','#ef4444',true],
  ['inspection_results','inspection_orders','inspection_id','#ef4444',false],
  ['non_conformances','inspection_orders','inspection_id','#ef4444',false],
  ['non_conformances','parts','part_id','#ef4444',true],
  ['capa_records','non_conformances','nc_id','#ef4444',false],
  // ── Accounting ──
  ['journal_lines','journal_entries','entry_id','#06b6d4',false],
  ['journal_lines','accounts','account_id','#06b6d4',false],
  // ── WMS ──
  ['bin_locations','warehouse_zones','zone_id','#d97706',false],
  ['bin_locations','parts','part_id','#d97706',true],
  ['inventory_transfers','parts','part_id','#d97706',false],
  ['inventory_transfers','bin_locations','from_bin_id','#d97706',true],
  ['inventory_transfers','bin_locations','to_bin_id','#d97706',true],
  ['inventory_transfers','warehouse_zones','from_zone_id','#d97706',true],
  ['inventory_transfers','warehouse_zones','to_zone_id','#d97706',true],
  ['pick_tasks','parts','part_id','#d97706',true],
  ['pick_tasks','bin_locations','from_bin_id','#d97706',true],
  ['cycle_counts','parts','part_id','#d97706',true],
  ['cycle_counts','bin_locations','bin_id','#d97706',true],
  ['cycle_counts','warehouse_zones','zone_id','#d97706',true],
  // ── Governance ──
  ['after_action_reviews','decision_logs','decision_log_id','#6b7280',false]
];

// ── SVG Builder ──────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg-content');
const langToggle = document.getElementById('langToggle');
let lang = 'en';

// table position lookup: id -> {x,y,w,h}
const tablePos = {};

function parseField(f) {
  const arrow = f.indexOf('→');
  if (arrow === -1) return { name: f, fk: false, pk: false, target: null };
  return { name: f.substring(0, arrow), fk: true, pk: false, target: f.substring(arrow+1) };
}
function isPK(fieldName, tableFields) {
  // first field is typically PK
  return tableFields[0] === fieldName || fieldName.indexOf('_no') > 0 || fieldName === 'id' || fieldName === 'code' || fieldName === 'username' || fieldName === 'account_no';
}

function buildDiagram() {
  svg.innerHTML = '';
  const ns = SVG_NS;
  const langText = T[lang];

  // Collect table positions
  DOMAINS.forEach(d => {
    d.tables.forEach(t => {
      const id = t[0], x = t[1], y = t[2], w = t[3], h = t[4];
      tablePos[id] = { x, y, w, h };
    });
  });

  // ── Draw domain zones ──
  DOMAINS.forEach(d => {
    // compute zone bounding box from tables
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    d.tables.forEach(t => {
      const tx = t[1], ty = t[2], tw = t[3], th = t[4];
      if (tx < minX) minX = tx;
      if (ty < minY) minY = ty;
      if (tx + tw > maxX) maxX = tx + tw;
      if (ty + th > maxY) maxY = ty + th;
    });
    const pad = 16;
    minX -= pad; minY -= pad + 10; maxX += pad; maxY += pad;
    const color = DOMAIN_COLORS[d.id];
    // bg rect
    const bg = document.createElementNS(ns, 'rect');
    bg.setAttribute('x', minX); bg.setAttribute('y', minY);
    bg.setAttribute('width', maxX - minX); bg.setAttribute('height', maxY - minY);
    bg.setAttribute('rx', 12); bg.setAttribute('ry', 12);
    bg.setAttribute('fill', DOMAIN_BG[d.id]);
    bg.setAttribute('stroke', color); bg.setAttribute('stroke-width', '1.5');
    bg.setAttribute('stroke-dasharray', '6,3');
    svg.appendChild(bg);

    // domain header
    const hdr = document.createElementNS(ns, 'text');
    hdr.setAttribute('x', minX + 14); hdr.setAttribute('y', minY + 18);
    hdr.setAttribute('font-size', '13'); hdr.setAttribute('font-weight', '700');
    hdr.setAttribute('fill', color);
    hdr.setAttribute('font-family', 'Inter, sans-serif');
    hdr.setAttribute('data-key', 'd.'+d.id);
    hdr.textContent = langText['d.'+d.id];
    svg.appendChild(hdr);
  });

  // ── Draw relationships (arrows) ──
  RELS.forEach(r => {
    const fromId = r[0], toId = r[1], fkName = r[2], color = r[3], dashed = r[4];
    const from = tablePos[fromId], to = tablePos[toId];
    if (!from || !to) return;

    // compute connection points: from right edge to left edge (or best side)
    let x1, y1, x2, y2;
    if (from.x + from.w < to.x) {
      // from right to left
      x1 = from.x + from.w; y1 = from.y + from.h / 2;
      x2 = to.x; y2 = to.y + to.h / 2;
    } else if (to.x + to.w < from.x) {
      x1 = from.x; y1 = from.y + from.h / 2;
      x2 = to.x + to.w; y2 = to.y + to.h / 2;
    } else if (from.y < to.y) {
      x1 = from.x + from.w / 2; y1 = from.y + from.h;
      x2 = to.x + to.w / 2; y2 = to.y;
    } else {
      x1 = from.x + from.w / 2; y1 = from.y;
      x2 = to.x + to.w / 2; y2 = to.y + to.h;
    }

    // Add curve control points for self-references
    let pathD;
    let dx = 0, dy = 0; // declare here so FK labels can use them
    if (fromId === toId) {
      // self-loop: curve above the table
      const cx = from.x + from.w / 2;
      const cy = from.y - 20;
      pathD = `M${from.x + from.w * 0.3},${from.y} C${from.x + from.w * 0.3},${cy} ${from.x + from.w * 0.7},${cy} ${from.x + from.w * 0.7},${from.y}`;
    } else {
      dx = x2 - x1; dy = y2 - y1;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const cp = Math.min(dist * 0.4, 40);
      pathD = `M${x1},${y1} C${x1 + cp * (dx>0?1:-1) * 0.3},${y1 + dy*0.1} ${x2 - cp * (dx>0?1:-1) * 0.3},${y2 - dy*0.1} ${x2},${y2}`;
    }

    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', pathD);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('stroke-dasharray', dashed ? '5,4' : 'none');
    // marker
    const markerId = 'arrow-' + (dashed ? 'dashed' : color.replace('#',''));
    const marker = document.getElementById(markerId);
    if (marker) {
      path.setAttribute('marker-end', 'url(#' + markerId + ')');
    }
    path.setAttribute('opacity', '0.7');
    svg.appendChild(path);

    // FK label on arrow
    const midX = (x1 + x2) / 2 + (dx>0?10:-10);
    const midY = (y1 + y2) / 2 - 8;
    const label = document.createElementNS(ns, 'text');
    label.setAttribute('x', midX); label.setAttribute('y', midY);
    label.setAttribute('font-size', '8'); label.setAttribute('fill', color);
    label.setAttribute('font-weight', '500');
    label.setAttribute('font-family', 'Inter, sans-serif');
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('data-key', 'fk.'+fromId+'.'+fkName);
    label.textContent = fkName;
    // background for label
    const bgL = document.createElementNS(ns, 'rect');
    const bbox = label.getBBox ? null : {width: fkName.length*7 + 4, height:12};
    bgL.setAttribute('x', midX - (fkName.length*3.5 + 2));
    bgL.setAttribute('y', midY - 9);
    bgL.setAttribute('width', fkName.length*7 + 4);
    bgL.setAttribute('height', 12);
    bgL.setAttribute('rx', 3);
    bgL.setAttribute('fill', 'rgba(255,255,255,0.85)');
    bgL.setAttribute('stroke', color); bgL.setAttribute('stroke-width', '0.5');
    svg.appendChild(bgL);
    svg.appendChild(label);
  });

  // ── Draw tables ──
  DOMAINS.forEach(d => {
    d.tables.forEach(t => {
      const id = t[0], x = t[1], y = t[2], w = t[3], h = t[4];
      const fields = t.slice(5);
      const color = DOMAIN_COLORS[d.id];

      // Table background
      const rect = document.createElementNS(ns, 'rect');
      rect.setAttribute('x', x); rect.setAttribute('y', y);
      rect.setAttribute('width', w); rect.setAttribute('height', h);
      rect.setAttribute('rx', 8); rect.setAttribute('ry', 8);
      rect.setAttribute('fill', 'white');
      rect.setAttribute('stroke', color); rect.setAttribute('stroke-width', '1.5');
      rect.setAttribute('filter', 'url(#shadowTable)');
      svg.appendChild(rect);

      // Header bar
      const hdrRect = document.createElementNS(ns, 'rect');
      hdrRect.setAttribute('x', x); hdrRect.setAttribute('y', y);
      hdrRect.setAttribute('width', w); hdrRect.setAttribute('height', 26);
      hdrRect.setAttribute('rx', 8); hdrRect.setAttribute('ry', 8);
      hdrRect.setAttribute('fill', color);
      hdrRect.setAttribute('opacity', '0.15');
      svg.appendChild(hdrRect);

      // Table name (top corner)
      const nameText = document.createElementNS(ns, 'text');
      nameText.setAttribute('x', x + 8); nameText.setAttribute('y', y + 18);
      nameText.setAttribute('font-size', '11'); nameText.setAttribute('font-weight', '600');
      nameText.setAttribute('fill', '#1e293b');
      nameText.setAttribute('font-family', 'Inter, sans-serif');
      nameText.setAttribute('data-key', 't.'+id);
      nameText.textContent = langText['t.'+id] || id;
      svg.appendChild(nameText);

      // PK icon
      const pkIcon = document.createElementNS(ns, 'text');
      pkIcon.setAttribute('x', x + w - 28); pkIcon.setAttribute('y', y + 18);
      pkIcon.setAttribute('font-size', '8'); pkIcon.setAttribute('font-weight', '500');
      pkIcon.setAttribute('fill', '#94a3b8');
      pkIcon.setAttribute('font-family', 'Inter, sans-serif');
      pkIcon.textContent = 'PK';
      svg.appendChild(pkIcon);

      // Fields
      let fy = y + 36;
      fields.forEach(f => {
        const parsed = parseField(f);
        const isFirstField = (fields.indexOf(f) === 0);
        const pk = isFirstField;

        const fieldText = document.createElementNS(ns, 'text');
        fieldText.setAttribute('x', x + 8); fieldText.setAttribute('y', fy);
        fieldText.setAttribute('font-size', '9.5'); fieldText.setAttribute('font-weight', pk ? '600' : '400');
        fieldText.setAttribute('fill', pk ? '#1e293b' : '#475569');
        fieldText.setAttribute('font-family', 'monospace');
        fieldText.textContent = parsed.name;
        svg.appendChild(fieldText);

        if (parsed.fk) {
          const fkText = document.createElementNS(ns, 'text');
          fkText.setAttribute('x', x + w - 26); fkText.setAttribute('y', fy);
          fkText.setAttribute('font-size', '7.5'); fkText.setAttribute('font-weight', '500');
          fkText.setAttribute('fill', color);
          fkText.setAttribute('font-family', 'Inter, sans-serif');
          fkText.textContent = 'FK';
          svg.appendChild(fkText);
        }

        fy += 17;
      });
    });
  });

  // ── Final: Title bar info ──
  // update subtitle with actual FK count
  const fkCount = RELS.length;
  document.querySelector('[data-key="subtitle"]').textContent =
    lang === 'en'
      ? `43 Tables · 11 Domains · ${fkCount} Foreign Keys`
      : `43 個資料表 · 11 個領域 · ${fkCount} 個外鍵`;

  // rebuild all data-key text elements
  document.querySelectorAll('[data-key]').forEach(el => {
    const key = el.getAttribute('data-key');
    if (langText[key]) {
      el.textContent = langText[key];
    }
  });
}

// ── Language Toggle ──
function setLang(l) {
  lang = l;
  document.querySelectorAll('.toggle-btn .opt').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === l);
  });
  buildDiagram();
}

langToggle.querySelectorAll('.opt').forEach(btn => {
  btn.addEventListener('click', () => setLang(btn.dataset.lang));
});

buildDiagram();
</script>
